# Build the docs and deploy to Cloudflare Workers on every push to main.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN     — Workers:Edit + Account:Read scoped token
#   CLOUDFLARE_ACCOUNT_ID    — your Cloudflare account id
#
# Get a token at: https://dash.cloudflare.com/profile/api-tokens
#   Use the "Edit Cloudflare Workers" template, scope it to the account
#   that owns the signalog-docs Worker.

name: Deploy docs to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so VitePress lastUpdated is accurate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run docs:build

      # On main: deploy to production.
      # On PRs: deploy to a preview alias so reviewers can click through.
      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deploy preview (PRs)
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --message "PR-${{ github.event.pull_request.number }}"
